name: CI/CD Pipeline - Tickets App

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ==========================================
  # 🧪 1. TESTS + SONARCLOUD + ARTEFACTOS (En la nube de GitHub)
  # ==========================================
  sonar:
    name: Tests & SonarCloud Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Dar permisos de ejecución al wrapper
        run: chmod +x mvnw

      - name: Ejecutar pruebas unitarias
        run: ./mvnw test -Dtest=CreateTicketUseCaseTest,GetTicketUseCaseTest,TicketTest,TicketControllerTest

      # Generación y Publicación del Artefacto de Pruebas
      - name: Publicar Artefacto de Reportes de Test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-pruebas-unitarias
          path: target/surefire-reports/
          retention-days: 5

      - name: Analisis SonarCloud (bloquea si falla)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw verify sonar:sonar \
            -Dtest=CreateTicketUseCaseTest,GetTicketUseCaseTest,TicketTest,TicketControllerTest \
            -Dsonar.projectKey="${{ secrets.SONAR_PROJECT_KEY }}" \
            -Dsonar.organization="${{ secrets.SONAR_ORGANIZATION }}" \
            -Dsonar.host.url="https://sonarcloud.io" \
            -Dsonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Subir reporte de cobertura Jacoco
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ github.sha }}
          path: target/site/jacoco/

      - name: Compilar proyecto
        run: ./mvnw clean package -DskipTests

      - name: Subir artefacto JAR
        uses: actions/upload-artifact@v4
        with:
          name: tickets-app-${{ github.sha }}
          path: target/*.jar

  # ==========================================
  # 🐳 2. BUILD DOCKER IMAGE (En la nube de GitHub)
  # ==========================================
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: sonar
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Login a GitHub Packages
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/tickets-app:latest
            ghcr.io/${{ github.repository }}/tickets-app:${{ github.sha }}

  # ==========================================
  # 📦 3. DEPLOY CON DOCKER COMPOSE (En tu Computadora)
  # ==========================================
  deploy:
    name: Deploy with Docker Compose
    runs-on: self-hosted
    needs: build-image
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Login a GitHub Packages
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy via Docker Compose
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Desplegando version: ${{ github.sha }}"
          docker compose up -d

      - name: Verificar contenedores activos
        run: docker ps